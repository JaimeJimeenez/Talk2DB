<section class="alerts-region" aria-live="polite" aria-label="Notificaciones">
  @for (alert of alerts(); track alert.id) {
    <article class="alert" [class]="'alert alert-' + alert.type">
      <talk2db-icon class="alert-icon" [icon]="icon(alert.type)" />
      <div class="alert-content">
        <strong>{{ alert.title }}</strong>
        @if (alert.message) {
          <p>{{ alert.message }}</p>
        }
      </div>
      <button class="alert-close" type="button" aria-label="Cerrar alerta" (click)="dismiss(alert.id)">
        <talk2db-icon [icon]="crossIcon" />
      </button>
    </article>
  }
</section>

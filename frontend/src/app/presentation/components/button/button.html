@if (button) {
  <button
    [disabled]="button.disabled"
    (click)="button.onClick()"
    [class]="button.class"    
  >
    @if (button.startIcon) {
      <talk2db-icon [icon]="button.startIcon" />
    }

    <span>{{ button.label }}</span>

    @if (button.endIcon) {
      <talk2db-icon [icon]="button.endIcon" />
    }
  </button>
}

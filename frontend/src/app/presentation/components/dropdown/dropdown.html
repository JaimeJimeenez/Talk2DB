<section class="dropdown">
  <button
    class="dropdown-trigger"
    type="button"
    [class.dropdown-trigger-open]="isOpen()"
    [class.dropdown-trigger-disabled]="disabled()"
    [attr.disabled]="disabled() ? true : null"
    (click)="toggle()"
  >
    <span class="dropdown-trigger-label">
      @if (dropdown().icon) {
        <talk2db-icon [icon]="dropdown().icon!" />
      }
      <span>{{ displayLabel() }}</span>
    </span>
    <talk2db-icon class="dropdown-chevron" [icon]="{ name: 'chevron-down', title: displayLabel(), size: 16 }" />
  </button>

  @if (isOpen()) {
    <div class="dropdown-list">
      @for (item of dropdown().items; track item.id) {
        <button
          class="dropdown-item"
          type="button"
          [class.dropdown-item-selected]="item.id === selectedId()"
          (click)="select(item)"
        >
          <span>{{ item.label }}</span>
        </button>
      } @empty {
        <p class="dropdown-empty">{{ dropdown().emptyLabel ?? 'Sin elementos' }}</p>
      }
    </div>
  }
</section>

<section class="sql-panel">
  <div class="sql-header">
    <span>SQL compilado</span>
    <button type="button" (click)="copy()">
      <talk2db-icon [icon]="copied() ? checkIcon : copyIcon" />
      {{ copied() ? 'Copiado' : 'Copiar' }}
    </button>
  </div>
  <pre><code>{{ sql() }}</code></pre>
</section>

<header>
  <div class="header-title">
    <h3>
      {{ title }}
      @if (conversationTitle()) {
        <span class="conversation-separator">&gt;</span>
        <span class="conversation-title">{{ conversationTitle() }}</span>
        @if (conversationSchema()) {
          <talk2db-chip [label]="conversationSchema()" />
        }
      }
    </h3>
  </div>
  <div class="header-options"></div>
</header>

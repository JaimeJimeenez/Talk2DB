<talk2db-auth-card title="Comenzar ahora" subtitle="Crea tu entorno de análisis">
  <form auth-card-form class="signup-form" [formGroup]="signupForm" (ngSubmit)="onSubmit()">
    @for (field of fields; track field.id) {
      <talk2db-text-field [field]="field" />
    }

    <div class="primary-action">
      <talk2db-button [button]="signupButton()" />
    </div>
  </form>

  <p auth-card-footer>
    ¿Ya tienes una cuenta?
    <a routerLink="/login">Iniciar sesión</a>
  </p>
</talk2db-auth-card>

<talk2db-auth-card title="Iniciar sesión" subtitle="Accede a tu entorno de análisis">
  <form auth-card-form class="login-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    @for (field of fields; track field.id) {
      <talk2db-text-field [field]="field" />
    }

    <div class="primary-action">
      <talk2db-button [button]="loginButton()" />
    </div>
  </form>

  <div auth-card-footer class="login-footer">
    <p>
      ¿No tienes una cuenta?
      <a routerLink="/signup">Regístrate ahora</a>
    </p>
  </div>
</talk2db-auth-card>

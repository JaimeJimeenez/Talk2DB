services:
  postgres:
    image: postgres:17-alpine
    env_file:
      - ./docker/postgres.env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talk2db_database -d talk2db_database"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - talk2db-net

  vllm:
    image: vllm/vllm-openai-cpu:latest-arm64
    command:
      - Qwen/Qwen2.5-Coder-0.5B-Instruct
      - --enforce-eager
      - --dtype
      - float
      - --max-model-len
      - "2048"
      - --generation-config
      - vllm
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    env_file:
      - ./docker/vllm.env
    ports:
      - "8001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    ipc: host
    cap_add:
      - SYS_NICE
    security_opt:
      - seccomp=unconfined
    networks:
      - talk2db-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
    env_file:
      - ./frontend/.env
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "7860:7860"
    depends_on:
      backend:
        condition: service_started
    networks:
      - talk2db-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    env_file:
      - ./docker/backend.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      vllm:
        condition: service_started
    networks:
      - talk2db-net

volumes:
  postgres-data:
  huggingface-cache:

networks:
  talk2db-net:
    driver: bridge

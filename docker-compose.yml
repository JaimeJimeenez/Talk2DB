services:
  postgres:
    image: postgres:17-alpine
    container_name: talk2db-postgres
    environment:
      POSTGRES_DB: talk2db
      POSTGRES_USER: talk2db
      POSTGRES_PASSWORD: talk2db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talk2db -d talk2db"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - talk2db-net

  backend:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    container_name: talk2db-backend
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+psycopg://talk2db:talk2db@postgres:5432/talk2db
      RAG_DATABASE_URL: postgresql+asyncpg://talk2db_reader:talk2db_reader@postgres:5432/talk2db
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434}
      LLM_API_KEY: ${LLM_API_KEY:-token-abc123}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5-coder:14b}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0}
      LLM_TOP_P: ${LLM_TOP_P:-0.9}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-512}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://ollama:11434}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-schema_context}
    depends_on:
      postgres:
        condition: service_healthy
      ollama-models:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - talk2db-net

  ollama:
    image: ollama/ollama:latest
    container_name: talk2db-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - talk2db-net

  ollama-models:
    image: ollama/ollama:latest
    container_name: talk2db-ollama-models
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-qwen2.5-coder:14b}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        ollama pull "$$LLM_MODEL"
        ollama pull "$$EMBEDDING_MODEL"
        ollama list
    networks:
      - talk2db-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: talk2db-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - talk2db-net

  frontend:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile.dev
    container_name: talk2db-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - talk2db-net

volumes:
  postgres-data:
  ollama_data:
  qdrant-data:
  hf-cache:

networks:
  talk2db-net:
    driver: bridge
